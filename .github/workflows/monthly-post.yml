name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check environment
        run: |
          echo "CLIENT_ID 長: ${#MIXI_CLIENT_ID}"
          echo "CLIENT_SECRET 長: ${#MIXI_CLIENT_SECRET}"
          echo "TOKEN_URL: $MIXI_TOKEN_URL"
          echo "API_SERVER: $MIXI_API_SERVER"
        env:
          MIXI_CLIENT_ID: ${{ secrets.MIXI_CLIENT_ID }}
          MIXI_CLIENT_SECRET: ${{ secrets.MIXI_CLIENT_SECRET }}
          MIXI_TOKEN_URL: https://application-auth.mixi.social/oauth2/token
          MIXI_API_SERVER: application-api.mixi.social

      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
      - name: Test token fetch
        run: |
          cat > test.cr << 'EOF'
          require "http/client"
          require "json"
          
          client_id = ENV["MIXI_CLIENT_ID"]? || "NOT_SET"
          client_secret = ENV["MIXI_CLIENT_SECRET"]? || "NOT_SET"
          token_url = ENV["MIXI_TOKEN_URL"]? || ""
          
          puts "CLIENT_ID: #{client_id[0..10]}..."
          puts "CLIENT_SECRET: #{client_secret[0..10]}..."
          puts "TOKEN_URL: #{token_url}"
          
          body = "grant_type=client_credentials&client_id=#{client_id}&client_secret=#{client_secret}"
          response = HTTP::Client.post(token_url,
            headers: HTTP::Headers{"Content-Type" => "application/x-www-form-urlencoded"},
            body: body)
          
          puts "Status: #{response.status_code}"
          puts "Body: #{response.body[0..200]}"
          EOF
          
          crystal run test.cr
        env:
          MIXI_CLIENT_ID: ${{ secrets.MIXI_CLIENT_ID }}
          MIXI_CLIENT_SECRET: ${{ secrets.MIXI_CLIENT_SECRET }}
          MIXI_TOKEN_URL: https://application-auth.mixi.social/oauth2/token
          MIXI_API_SERVER: application-api.mixi.social
