name: Monthly Post (Plugin)

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.6'
      
      - name: Run Crystal bot for month-end check
        env:
          MIXI_CLIENT_ID: ${{ secrets.MIXI_CLIENT_ID }}
          MIXI_CLIENT_SECRET: ${{ secrets.MIXI_CLIENT_SECRET }}
          MIXI_TOKEN_URL: https://application-auth.mixi.social/oauth2/token
          MIXI_API_SERVER: application-api.mixi.social
        run: crystal run src/main.cr
      
      - name: Clone mixi2 sample
        run: |
          git clone https://github.com/mixigroup/mixi2-application-sample-go.git /tmp/mixi2-sample
      
      - name: Create Go post script
        run: |
          mkdir -p /tmp/mixi2-sample/cmd/post
          cp bin/post.go /tmp/mixi2-sample/cmd/post/main.go
      
      - name: Install Go dependencies
        working-directory: /tmp/mixi2-sample
        run: go mod tidy
      
      - name: Run Go post
        working-directory: /tmp/mixi2-sample
        env:
          CLIENT_ID: ${{ secrets.MIXI_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.MIXI_CLIENT_SECRET }}
          TOKEN_URL: https://application-auth.mixi.social/oauth2/token
          API_ADDRESS: application-api.mixi.social:443
          COMMUNITY_ID: ${{ secrets.MIXI_COMMUNITY_ID }}
        run: go run cmd/post/main.go
